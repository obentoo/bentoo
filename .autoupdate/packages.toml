# Bentoo Autoupdate Package Configuration
# Each section defines how to check upstream versions for a package.
#
# Records below were generated by inspecting each upstream source in a real
# browser (Playwright + Chrome DevTools) to pick the exact, stable extraction
# rule — not by guessing. The "html" parser requires the NewParserFromConfig
# wiring fix in Checker.fetchAndParse (selector/xpath were ignored before).

["net-misc/postman-bin"]
url = "https://dl.pstmn.io/api/version/latest?platform=linux64&channel=stable"
parser = "json"
path = "version"
binary = true

# Cursor — version lives in the AppImage download link's href attribute.
# Verified in-browser: href = .../linux-x64/cursor/<ver>. SSR, so static GET works.
["app-editors/cursor"]
url = "https://www.cursor.com/download"
parser = "html"
xpath = "(//a[contains(@href, '/linux-x64/cursor/')]/@href)[1]"
pattern = "cursor/([0-9.]+)"

# Obsidian — official release manifest consumed by the updater.
["app-office/obsidian"]
url = "https://raw.githubusercontent.com/obsidianmd/obsidian-releases/HEAD/desktop-releases.json"
parser = "json"
path = "latestVersion"

# Claude Code — published to npm; dist-tags.latest is the stable channel.
["dev-util/claude-code"]
url = "https://registry.npmjs.org/@anthropic-ai/claude-code"
parser = "json"
path = "dist-tags.latest"

# pnpm — npm package, stable channel.
["sys-apps/pnpm"]
url = "https://registry.npmjs.org/pnpm"
parser = "json"
path = "dist-tags.latest"

# qBittorrent — GitHub release tag is "release-X.Y.Z"; the "release-" prefix is
# stripped by the version normalizer before comparison.
["net-p2p/qbittorrent"]
url = "https://api.github.com/repos/qbittorrent/qBittorrent/releases/latest"
parser = "json"
path = "tag_name"
headers = { "User-Agent" = "bentoo-autoupdate" }

# Inkscape — /release/ redirects to /release/inkscape-<ver>/; the <title> holds
# the version. GitLab tags/releases use the unusable "INKSCAPE_1_4" form, so the
# official site title is the clean source.
["media-gfx/inkscape"]
url = "https://inkscape.org/release/"
parser = "html"
selector = "title"
pattern = "([0-9]+\\.[0-9]+\\.[0-9]+)"

# Dart — official stable channel VERSION manifest.
["dev-lang/dart"]
url = "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/VERSION"
parser = "json"
path = "version"

# Kiro — kiro.dev is a SPA; the download links are JS-injected. Chrome DevTools
# network inspection revealed this metadata endpoint (consumed by the site),
# whose "currentRelease" is the authoritative stable version.
["app-editors/kiro"]
url = "https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json"
parser = "json"
path = "currentRelease"

# Windsurf — changelog is SSR; the newest entry (and first X.Y.Z match) is the
# current version. Anchored to the X.Y.Z form so the date-like "2026.M.D" that
# appears later is never the first match.
["app-editors/windsurf"]
url = "https://windsurf.com/changelog"
parser = "regex"
pattern = "([0-9]+\\.[0-9]+\\.[0-9]+)"

# Betterbird — downloads page lists the current release as "<ver>esr-bbNN";
# anchoring on "esr-bb" yields a precise, unambiguous capture.
["mail-client/betterbird-bin"]
url = "https://www.betterbird.eu/downloads/"
parser = "regex"
pattern = "([0-9]+\\.[0-9]+\\.[0-9]+)esr-bb[0-9]+"
