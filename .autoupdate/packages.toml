parser = "regex"
pattern = 'nomachine_([0-9]+\.[0-9]+\.[0-9]+)_[0-9]+_amd64\.deb'
binary = true
# nxplayer — NoMachine download page is SSR; regex on the .deb filename gives the
# current version (single version on page → deterministic first match).

["app-office/freeoffice"]
enabled = true
url = "https://www.freeoffice.com/en/download/applications"
parser = "regex"
pattern = 'Revision ([0-9]+)'
binary = true
# freeoffice — download page states "Revision NNNN | date" (the ebuild's PV); SSR.

["sci-biology/foldingathome"]
url = "https://download.foldingathome.org/releases/public/fah-client/meta.json"
parser = "regex"
pattern = 'fah-client_([0-9]+\.[0-9]+\.[0-9]+)'
binary = true
# foldingathome — fah-client meta.json lists only the current release set; every
# filename carries the same version, so the first regex match is the current one.


["dev-util/nvidia-cuda-toolkit"]
url = "https://developer.nvidia.com/cuda-downloads?target_os=Linux&target_arch=x86_64&Distribution=Fedora&target_version=44&target_type=runfile_local"
parser = "regex"
pattern = 'cuda_([0-9]+\.[0-9]+\.[0-9]+)_'
binary = true
# nvidia-cuda-toolkit — the cuda-downloads page is SSR; the runfile link
# "cuda_X.Y.Z_<driver>_linux.run" carries the current toolkit version (distro in
# the query string only changes the installer, not the CUDA version).

# ============================================================================
# Extension parsers (transform / select / script) — bentoolkit autoupdate.
# transform = ordered regex substitutions on the extracted version.
# select = "max" picks the highest of several matches (not the first).
# parser = "script" runs JS in a headless browser; needs a bentoo built with
#   `-tags playwright` and the Playwright browsers installed (else the package
#   errors with "script parser support not built").
# ============================================================================

["media-gfx/imagemagick"]
url = "https://api.github.com/repos/ImageMagick/ImageMagick/tags"
parser = "json"
path = "[0].name"
transform = [["-", "."]]
# imagemagick — GitHub tags newest-first ("7.1.2-24"); transform hyphen→dot so it
# compares against the ebuild "7.1.2.24" (was SKIP: "not comparable").

["dev-games/godot"]
enabled = true
url = "https://godotengine.org/download/archive/"
parser = "regex"
pattern = '(\d+\.\d+(?:\.\d+)?-(?:stable|beta\d*|rc\d*|dev\d*))'
transform = [["-stable", ""], ["-beta", "_beta"], ["-rc", "_rc"], ["-dev", "_alpha"]]
# godot — download archive lists newest first; transform the upstream suffix to
# Gentoo form (-stable→bare, -beta→_beta, -rc→_rc, -dev→_alpha).

["dev-build/gn"]
url = "https://deps.gentoo.zip/dev-build/gn/"
parser = "regex"
pattern = 'gn-([0-9][0-9.]*)\.tar\.xz'
select = "max"
# gn — deps.gentoo.zip lists tarballs in ascending order; select=max picks the
# highest (was SKIP: assumed git-only, but the mirror does host versioned tarballs).

["app-office/libreoffice"]
enabled = true
url = "https://download.documentfoundation.org/libreoffice/src/"
parser = "script"
script = "@libreoffice.js"
# libreoffice — src/ index lists 3-segment dirs ascending; the JS picks the newest
# dir and reads the 4-segment tarball version inside it.

["app-office/libreoffice-l10n"]
enabled = true
url = "https://download.documentfoundation.org/libreoffice/src/"
parser = "script"
script = "@libreoffice.js"
# libreoffice-l10n — follows the LibreOffice core release (same probe).

["app-dicts/myspell-hu"]
url = "https://downloadarchive.documentfoundation.org/libreoffice/old/"
parser = "regex"
pattern = 'href="([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)/"'
select = "max"
# myspell-hu — PV=LO_VER; the hu langpack ships in the archive tree the ebuild's
# SRC_URI pulls from. old/ lists full 4-segment release dirs, so a plain regex
# (anchored on the trailing "/" to skip alpha/beta/rc dirs; select=max) recovers
# the newest stable version deterministically, without the headless src/ probe.

["app-editors/antigravity-bin"]
url = "https://antigravity.google/download"
parser = "script"
script = "@antigravity.js"
# Antigravity IDE — the original VS Code fork (NOT "Antigravity 2.0", the separate
# desktop hub). /download is an Angular SPA (empty raw HTML); the script renders it
# and reads the IDE's edgedl link, returning PV "X.Y.Z.BUILD" (e.g. 2.0.3.6242596486512640).

["dev-util/antigravity-hub-bin"]
url = "https://antigravity.google/download"
parser = "script"
script = "@antigravity-hub.js"
# Antigravity 2.0 — the standalone desktop hub (agent orchestration), a separate
# product from the IDE above. Same Angular SPA page; the script reads the GCS
# "antigravity-hub" link, returning PV "X.Y.Z.BUILD" (e.g. 2.0.10.5119448496078848).

# Warsaw — banking security blob. The download URL is version-less
# (warsaw_setup64.run), but the .run is a ZIP whose embedded Debian package name
# "warsaw_<ver>-<rev>_amd64.deb" appears in plaintext ~590 KB in (well under the
# 10 MiB body cap), so a regex over the raw body recovers it. transform turns the
# "X.Y.Z-R" deb revision into the ebuild's 4-segment PV (2.21.5-1 -> 2.21.5.1).
["www-misc/warsaw"]
url = "https://cloud.gastecnologia.com.br/bb/downloads/ws/debian/warsaw_setup64.run"
parser = "regex"
pattern = 'warsaw_([0-9.]+-[0-9]+)_amd64\.deb'
transform = [["-", "."]]

