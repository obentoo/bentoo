enabled = false
url = "https://openvpn.net/community-downloads/"
parser = "regex"
pattern = 'OpenVPN-([0-9]+\.[0-9]+\.[0-9]+)'
# openvpn — community-downloads page; anchored to "OpenVPN-X.Y.Z".
# Disabled: no net-vpn/openvpn ebuild in the overlay (orphaned entry); kept for
# when the package is re-added. Re-enable by removing the enabled = false line.

["app-text/libetonyek"]
url = "https://api.github.com/repos/LibreOffice/libetonyek/tags?per_page=5"
parser = "regex"
pattern = 'libetonyek-([0-9]+\.[0-9]+\.[0-9]+)'
headers = { "User-Agent" = "bentoo-autoupdate" }
# libetonyek — GitHub mirror tags (newest-first); "libetonyek-X.Y.Z".

# ============================================================================
# Snapshot / git-commit packages  (track upstream stable; Gentoo _pre/_p ordering)
# ============================================================================

["media-libs/mesa"]
track = "commit"
url = "https://gitlab.freedesktop.org/api/v4/projects/mesa%2Fmesa/repository/commits?ref_name=main&per_page=50"
parser = "json"
path = "[0].committed_date"
commit_sha_path = "[0].id"
transform = [["T.*", ""], ["-", ""]]
# mesa — commit-tracked on main; _pre suffix preserved from current ebuild.

["dev-util/mesa_clc"]
track = "commit"
url = "https://gitlab.freedesktop.org/api/v4/projects/mesa%2Fmesa/repository/commits?ref_name=main&per_page=50"
parser = "json"
path = "[0].committed_date"
commit_sha_path = "[0].id"
transform = [["T.*", ""], ["-", ""]]
# mesa_clc — part of the mesa tree; same source/rule as media-libs/mesa.

["app-editors/zed"]
track = "commit"
url = "https://api.github.com/repos/zed-industries/zed/commits?sha=main&per_page=50"
parser = "json"
path = "[0].commit.committer.date"
commit_sha_path = "[0].sha"
transform = [["T.*", ""], ["-", ""]]
headers = { "User-Agent" = "bentoo-autoupdate" }
# zed — commit-tracked on main; _pre suffix preserved from current ebuild.

["app-editors/zed-bin"]
url = "https://api.github.com/repos/zed-industries/zed/releases/latest"
parser = "json"
path = "tag_name"
headers = { "User-Agent" = "bentoo-autoupdate" }
binary = true
# zed-bin — binary repack; same upstream releases.

["dev-db/sqlitebrowser"]
track = "commit"
url = "https://api.github.com/repos/sqlitebrowser/sqlitebrowser/commits?sha=master&per_page=50"
parser = "json"
path = "[0].commit.committer.date"
commit_sha_path = "[0].sha"
transform = [["T.*", ""], ["-", ""]]
headers = { "User-Agent" = "bentoo-autoupdate" }
# sqlitebrowser — commit-tracked on master (uses COMMIT= without quotes); date YYYYMMDD becomes _pDATE suffix.

["net-libs/libqmi"]
track = "commit"
url = "https://gitlab.freedesktop.org/api/v4/projects/mobile-broadband%2Flibqmi/repository/commits?ref_name=main&per_page=50"
parser = "json"
path = "[0].committed_date"
commit_sha_path = "[0].id"
transform = [["T.*", ""], ["-", ""]]
# libqmi — commit-tracked on main; _pre suffix preserved from current ebuild.

["net-misc/modemmanager"]
track = "commit"
url = "https://gitlab.freedesktop.org/api/v4/projects/mobile-broadband%2FModemManager/repository/commits?ref_name=main&per_page=50"
parser = "json"
path = "[0].committed_date"
commit_sha_path = "[0].id"
transform = [["T.*", ""], ["-", ""]]
# modemmanager — commit-tracked on main (GitLab); date YYYYMMDD becomes _pDATE suffix.

["dev-util/breakpad"]
url = "https://api.github.com/repos/google/breakpad/tags?per_page=20"
parser = "regex"
pattern = '"name":"v([0-9]{4}\.[0-9]{2}\.[0-9]{2})"'
headers = { "User-Agent" = "bentoo-autoupdate" }
# breakpad — upstream google/breakpad uses date tags "vYYYY.MM.DD".

["dev-util/glslang"]
track = "commit"
url = "https://api.github.com/repos/KhronosGroup/glslang/commits?sha=main&per_page=50"
parser = "json"
path = "[0].commit.committer.date"
commit_sha_path = "[0].sha"
commit_message_path = "commit.message"
commit_version_pattern = 'vulkan-sdk-([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)'
transform = [["T.*", ""], ["-", ""]]
headers = { "User-Agent" = "bentoo-autoupdate" }
# glslang — commit-tracked on main; scans titles for vulkan-sdk-X.Y.Z.W to detect base bump.

