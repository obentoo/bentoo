# ============================================================================
# Extension parsers (transform / select / script) — bentoolkit autoupdate.
# transform = ordered regex substitutions on the extracted version.
# select = "max" picks the highest of several matches (not the first).
# parser = "script" runs JS in a headless browser; needs a bentoo built with
#   `-tags playwright` and the Playwright browsers installed (else the package
#   errors with "script parser support not built").
# ============================================================================

["media-gfx/imagemagick"]
url = "https://api.github.com/repos/ImageMagick/ImageMagick/tags"
parser = "json"
path = "[0].name"
transform = [["-", "."]]
# imagemagick — GitHub tags newest-first ("7.1.2-24"); transform hyphen→dot so it
# compares against the ebuild "7.1.2.24" (was SKIP: "not comparable").

["dev-games/godot"]
url = "https://godotengine.org/download/archive/"
parser = "regex"
pattern = '(\d+\.\d+(?:\.\d+)?-(?:stable|beta\d*|rc\d*|dev\d*))'
transform = [["-stable", ""], ["-beta", "_beta"], ["-rc", "_rc"], ["-dev", "_alpha"]]
# godot — download archive lists newest first; transform the upstream suffix to
# Gentoo form (-stable→bare, -beta→_beta, -rc→_rc, -dev→_alpha).

["dev-build/gn"]
url = "https://deps.gentoo.zip/dev-build/gn/"
parser = "regex"
pattern = 'gn-([0-9][0-9.]*)\.tar\.xz'
select = "max"
# gn — deps.gentoo.zip lists tarballs in ascending order; select=max picks the
# highest (was SKIP: assumed git-only, but the mirror does host versioned tarballs).

["app-office/libreoffice"]
url = "https://download.documentfoundation.org/libreoffice/src/"
parser = "script"
script = "@libreoffice.js"
# libreoffice — src/ index lists 3-segment dirs ascending; the JS picks the newest
# dir and reads the 4-segment tarball version inside it.

