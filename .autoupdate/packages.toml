# Live=0.19.9 > ebuild 0.19.8 (crates.io rejects default UA — header required). A real bump
# must regenerate CRATES= (pycargoebuild). GitHub releases/latest agrees (tag 0.19.9) as a cross-check.

# --- KDE invent GitLab tags (parser=json, path=[0].name) ---

["media-libs/kquickimageeditor"]
enabled = false
url = "https://invent.kde.org/api/v4/projects/libraries%2Fkquickimageeditor/repository/tags"
parser = "json"
path = "[0].name"
# KDE invent tags API, [0]=newest. Tags are clean vX.Y.Z (leading v stripped). Live=v0.6.2.
# Watch for future beta/rc tags surfacing at [0]; fallback is regex over download.kde.org/stable listing.

# --- Debian source package (xvfb-run tracks xorg-server's Debian diff revision) ---

# xvfb-run PV = xorg-server X.Y.Z plus the Debian diff revision W => X.Y.Z.W; SRC_URI fetches
# mirror://debian .../xorg-server_X.Y.Z-W.diff.gz. The Debian sources API JSON lists versions
# newest-first; the first "version" (sid) carries the fixed "2:" epoch, so the regex captures
# "X.Y.Z-W" after it and transform "-"->"." yields the 4-segment PV. Live: "2:21.1.23-1" -> 21.1.23.1.
# (regex-over-body, like www-misc/warsaw, avoids a mid-path JSON index that has no precedent here.)
["x11-misc/xvfb-run"]
url = "https://sources.debian.org/api/src/xorg-server/"
parser = "regex"
pattern = '"version":\s*"2:([0-9]+\.[0-9]+\.[0-9]+-[0-9]+)"'
transform = [["-", "."]]

# ============================================================================
# Gentoo mirrors / series-pinned (enabled=false, added 2026-06-20) — bentoo
# tracks these AHEAD of Gentoo but bumps them BY HAND (rust patchset+LLVM_COMPAT,
# webkit dual-slot, audacity 3.7.x pin, ollama llama.cpp rearch), so the cron must
# not auto-bump. The source is still correct: run `--check <pkg> --force` to probe.
# ============================================================================

# --- rust: source, -bin and -common share ONE stable Rust version (channel toml) ---

["dev-lang/rust"]
enabled = false
url = "https://static.rust-lang.org/dist/channel-rust-stable.toml"
parser = "regex"
pattern = '\[pkg\.rust\]\s+version = "([0-9]+\.[0-9]+\.[0-9]+)'
# Stable Rust toolchain, anchored on the sole [pkg.rust] block (the toml also has
# cargo 0.97.x / rustc 0.1.x lines — an unanchored regex would grab the wrong one).
# group1=clean X.Y.Z. rust-lang/rust /tags is WRONG (legacy 'release-0.7', not version-sorted).

["dev-lang/rust-bin"]
enabled = false
url = "https://static.rust-lang.org/dist/channel-rust-stable.toml"
parser = "regex"
pattern = '\[pkg\.rust\]\s+version = "([0-9]+\.[0-9]+\.[0-9]+)'
# Same stable Rust release as dev-lang/rust (binary toolchains from static.rust-lang.org/dist).

["dev-lang/rust-common"]
enabled = false
url = "https://static.rust-lang.org/dist/channel-rust-stable.toml"
parser = "regex"
pattern = '\[pkg\.rust\]\s+version = "([0-9]+\.[0-9]+\.[0-9]+)'
# Pure-rename package shadowing the rust source PV; bump in lockstep with dev-lang/rust.

# --- audacity: pinned to stable 3.7.x (Audacity 4.x pre-release tags don't compile) ---

["media-sound/audacity"]
enabled = false
url = "https://api.github.com/repos/audacity/audacity/tags?per_page=100"
parser = "regex"
pattern = 'Audacity-(3\.7\.[0-9]+)'
select = "max"
headers = { "User-Agent" = "bentoo-autoupdate" }
# GitHub /tags is NOT version-sorted (first match=2.3.2) -> select=max over the 3.7.x
# matches. Audacity-4.0.0-{alpha,beta} tags exist upstream but don't compile and are
# excluded by the 3\.7\. series anchor. group1 has no prefix (normalizer no-op).

# --- webkit-gtk: pinned to stable 2.52.x (both slots -r411/-r601 share PV) ---

["net-libs/webkit-gtk"]
enabled = true
url = "https://www.webkitgtk.org/releases/"
parser = "regex"
pattern = 'webkitgtk-(2\.52\.[0-9]+)\.tar\.xz'
select = "max"
# webkitgtk.org HTML listing (ascending) -> select=max over the 2.52.x series; ignores
# dev 2.53.x and the 2.48 LTS / 2.50 lines. One entry covers both slots (share PV 2.52.4).

# --- ollama source: same upstream repo as sci-ml/ollama-bin ---

["sci-ml/ollama"]
enabled = true
url = "https://api.github.com/repos/ollama/ollama/releases/latest"
parser = "json"
path = "tag_name"
headers = { "User-Agent" = "bentoo-autoupdate" }
# ollama source — same repo as ollama-bin; tag "vX.Y.Z" (leading v stripped). hold=true
# (NOT enabled=false, whose ebuild is present so the overlay reconciliation would
# re-enable it): the llama.cpp FetchContent rearch needs manual patchset/distfile
# work per bump, so this is a deliberate maintainer hold, never auto-flipped.
# I enabled for test the update

