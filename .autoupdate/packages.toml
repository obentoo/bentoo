# Bentoo Autoupdate Package Configuration
# Each section defines how to check upstream versions for a package.
#
# Records were generated by inspecting each upstream source by real download
# (curl/gh + Playwright/Chrome DevTools for SPAs), validating that the chosen
# parser/path/pattern extracts the current version and compares correctly to the
# ebuild (Gentoo version rules: prefixes v/release-/ver-/version- stripped;
# regex returns capture group 1 of the FIRST match on the raw body).
#
# 281 records (265 original + 9 added 2026-06-20 enabled + 6 Gentoo-mirror /
# manual-cadence enabled=false: rust{,-bin,-common}, audacity, webkit-gtk,
# sci-ml/ollama — all live-verified). The SKIPPED block below is empty.
#
# NOTE: BEGIN/END markers below are comments only. Do NOT use bare [BEGIN]/[END]
# table syntax here — TOML would parse them as phantom packages.

# >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>  BEGIN PACKAGES  <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<

# ============================================================================
# npm registry  (parser=json, path=dist-tags.latest)
# ============================================================================

["dev-util/claude-code"]
enabled = true
url = "https://registry.npmjs.org/@anthropic-ai/claude-code"
parser = "json"
path = "dist-tags.latest"
# claude-code — npm @anthropic-ai/claude-code; dist-tags.latest is the stable channel.

["sys-apps/pnpm"]
url = "https://registry.npmjs.org/pnpm"
parser = "json"
path = "dist-tags.latest"
# pnpm — npm package, stable channel.

# ============================================================================
# Vendor JSON API  (per-vendor endpoint)
# ============================================================================

["app-editors/cursor"]
url = "https://api2.cursor.sh/updates/api/download/stable/linux-x64/cursor"
parser = "json"
path = "version"
commit_sha_path = "commitSha"
# Cursor — official download API; "version" is the full version. commitSha is the
# per-release BUILD_ID embedded in SRC_URI; the applier substitutes it into the
# ebuild's BUILD_ID="..." so the .deb URL matches the bumped version (else 403).

["app-editors/kiro"]
url = "https://prod.download.desktop.kiro.dev/stable/metadata-linux-x64-stable.json"
parser = "json"
path = "currentRelease"
# Kiro — kiro.dev SPA metadata endpoint (found via DevTools); "currentRelease" is authoritative.

["app-office/obsidian"]
enabled = true
url = "https://raw.githubusercontent.com/obsidianmd/obsidian-releases/HEAD/desktop-releases.json"
parser = "json"
path = "latestVersion"
# Obsidian — official release manifest consumed by the updater.

["dev-lang/dart"]
url = "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/VERSION"
parser = "json"
path = "version"
# Dart — official stable channel VERSION manifest.

["net-misc/postman-bin"]
url = "https://dl.pstmn.io/api/version/latest?platform=linux64&channel=stable"
parser = "json"
path = "version"
binary = true
# Postman — official version API; clean {"version":"..."}.

["net-libs/nodejs"]
url = "https://nodejs.org/dist/index.json"
parser = "json"
path = "[0].version"
# Node.js — official dist index, sorted newest-first; [0].version (normalizer strips "v").

["mail-client/proton-mail-bin"]
url = "https://proton.me/download/mail/linux/version.json"
parser = "json"
path = "Releases[0].Version"
binary = true
# Proton Mail (desktop) — proton.me version.json; Releases[0] is the EarlyAccess/beta
# channel that matches the ebuild's *-beta.rpm (GitHub inbox-desktop is stale).

["mail-mta/proton-mail-bridge"]
url = "https://api.github.com/repos/ProtonMail/proton-bridge/releases/latest"
parser = "json"
path = "tag_name"
headers = { "User-Agent" = "bentoo-autoupdate" }
# Proton Mail Bridge — GitHub release tag "vX.Y.Z" ("v" stripped).

# ============================================================================
# Vendor HTML / regex scraping
# ============================================================================

["app-editors/devin-desktop-bin"]
url = "https://docs.devin.ai/desktop/changelog"
parser = "script"
script = "@devin.js"
# Windsurf — rebranded to "Devin Desktop"; changelog is now a client-rendered SPA
# at docs.devin.ai (windsurf.com/changelog 308-redirects there). Raw HTML only has
# an asset version (false "7.2.0"); the script reads the real "Download X.Y.Z".

["mail-client/betterbird-bin"]
url = "https://www.betterbird.eu/downloads/"
parser = "regex"
pattern = 'Current version:\s*Betterbird\s*([0-9]+\.[0-9]+\.[0-9]+)esr-bb[0-9]+'
# Betterbird — anchor on the "Current version: Betterbird <ver>esr-bbNN" label
# (not a bare "esr-bb" match): the page also lists "Previous/" archive links, so
# a loose pattern can capture an older version if the HTML order shifts.
# CAVEAT: esr-bbNN is an upstream build counter that increments every release
# (140.11.0=bb23, 140.12.0=bb24, ...) with no derivation from the ESR version.
# The applier only bumps PV (and 40-hex commit SHAs), so it CANNOT sync the
# ebuild's MY_BUILD="esr-bbNN". Every bump needs MY_BUILD updated by hand, else
# the SRC_URI 404s at manifest time. Look up the current bb on the page above.

["media-gfx/inkscape"]
url = "https://gitlab.com/api/v4/projects/inkscape%2Finkscape/repository/tags?per_page=20"
parser = "regex"
pattern = '"name":"INKSCAPE_([0-9]+_[0-9]+_[0-9]+)"'
transform = [["_", "."]]
headers = { "User-Agent" = "bentoo-autoupdate" }
# Inkscape — inkscape.org/release/ now 502s sitewide; read tags off the GitLab API.
# Tags are "INKSCAPE_X_Y_Z" (the trailing quote skips _RC/_BETA pre-releases); the
# transform rewrites underscores to dots. First match in the body is the newest stable.

["app-office/openoffice-bin"]
enabled = true
url = "https://www.openoffice.org/"
parser = "regex"
pattern = 'Apache OpenOffice ([0-9]+\.[0-9]+\.[0-9]+)'
binary = true
# Apache OpenOffice — homepage states "Apache OpenOffice X.Y.Z" as current.

["media-gfx/pixieditor-bin"]
url = "https://api.github.com/repos/PixiEditor/PixiEditor/releases/latest"
parser = "json"
path = "tag_name"
headers = { "User-Agent" = "bentoo-autoupdate" }
binary = true
# PixiEditor — GitHub releases (tag is 4-part bare version, e.g. 2.1.1.5).

["dev-vcs/gitkraken"]
url = "https://support.gitkraken.com/release-notes/current"
parser = "script"
script = "@gitkraken.js"
# GitKraken — release notes moved to a client-rendered SPA at support.gitkraken.com
# (www.gitkraken.com/release-notes 301-redirects there). Raw HTML leads with an
# asset version (false "15.0.3"); the script reads the newest "Version X.Y.Z" heading.

["net-print/hplip-plugin"]
enabled = false
url = "https://sourceforge.net/projects/hplip/rss?path=/hplip"
parser = "regex"
pattern = 'hplip-([0-9]+\.[0-9]+\.[0-9]+)'
# hplip-plugin — version tracks HPLIP; SourceForge RSS lists "hplip-X.Y.Z" newest-first.

["net-ftp/filezilla-pro"]
url = "https://filezillapro.com/filezilla-pro-version-history/"
parser = "regex"
pattern = 'Latest:\s*([0-9]+\.[0-9]+\.[0-9]+)'
headers = { "User-Agent" = "Mozilla/5.0" }
binary = true
type = "bin"
meta = { fetch_method = "post", fetch_url = "https://filezilla-project.org/prodownload.php?beta=0", fetch_serial_env = "FILEZILLA_PRO_KEY", fetch_serial_field = "key", fetch_filename = "FileZilla_Pro_{version}_x86_64-linux-gnu.tar.xz", fetch_form = "mail=&number=&platform=linux&platform_cli=win&platform_cli_nonpro=win&platform_fzpes=win&download_program=Start download of FileZilla Pro" }
# FileZilla Pro — version-history page's "Latest: X.Y.Z" is the current stable
# release (the h3 changelog list also includes -betaN, so anchor on "Latest:").
# Binary, serial-gated: the .tar.xz is not on a public mirror — at --apply time
# the [meta] block drives an authenticated POST to prodownload.php (the form's
# `key` field carries the serial; ALL form fields must be sent or the server
# silently re-shows the form). The serial comes from $FILEZILLA_PRO_KEY (or
# ~/.config/bentoo/secrets) and is never committed here. The downloaded file is
# dropped into pkgdev's distdir so the Manifest digests it directly.

["app-emulation/crossover-bin"]
url = "https://www.codeweavers.com/crossover/changelog"
parser = "regex"
pattern = '<a name="([0-9]+\.[0-9]+\.[0-9]+)"'
select = "max"
binary = true
type = "bin"
# CrossOver — changelog page lists each release as `<a name="X.Y.Z">`, newest first;
# present in the raw HTML (not JS-only). Download is the .deb under media.codeweavers.com
# named by ${PV}; the .bin installer (install-crossover-X.Y.Z.bin) mirrors the same version.

