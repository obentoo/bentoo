# sqlitebrowser — releases/latest excludes prereleases (clean vX.Y.Z stable).
["dev-db/sqlitebrowser"]
url = "https://api.github.com/repos/sqlitebrowser/sqlitebrowser/releases/latest"
parser = "json"
path = "tag_name"
headers = { "User-Agent" = "bentoo-autoupdate" }

# libqmi — GitLab tags; regex matches clean stable (skips -dev).
["net-libs/libqmi"]
url = "https://gitlab.freedesktop.org/api/v4/projects/mobile-broadband%2Flibqmi/repository/tags?per_page=100"
parser = "regex"
pattern = '"name":"([0-9]+\.[0-9]+\.[0-9]+)"'

# modemmanager — GitLab tags; regex skips -dev, captures stable X.Y.Z.
["net-misc/modemmanager"]
url = "https://gitlab.freedesktop.org/api/v4/projects/mobile-broadband%2FModemManager/repository/tags?per_page=100"
parser = "regex"
pattern = '"name":"([0-9]+\.[0-9]+\.[0-9]+)"'

# breakpad — upstream google/breakpad uses date tags "vYYYY.MM.DD".
["dev-util/breakpad"]
url = "https://api.github.com/repos/google/breakpad/tags?per_page=20"
parser = "regex"
pattern = '"name":"v([0-9]{4}\.[0-9]{2}\.[0-9]{2})"'
headers = { "User-Agent" = "bentoo-autoupdate" }

# glslang — Khronos Vulkan-SDK tags "vulkan-sdk-X.Y.Z.W".
["dev-util/glslang"]
url = "https://api.github.com/repos/KhronosGroup/glslang/tags?per_page=100"
parser = "regex"
pattern = '"name":"vulkan-sdk-([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)"'
headers = { "User-Agent" = "bentoo-autoupdate" }

# spirv-headers — Khronos Vulkan-SDK tags "vulkan-sdk-X.Y.Z.W".
["dev-util/spirv-headers"]
url = "https://api.github.com/repos/KhronosGroup/SPIRV-Headers/tags?per_page=100"
parser = "regex"
pattern = '"name":"vulkan-sdk-([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)"'
headers = { "User-Agent" = "bentoo-autoupdate" }

# spirv-tools — Khronos Vulkan-SDK tags (4-group anchor isolates the SDK series).
["dev-util/spirv-tools"]
url = "https://api.github.com/repos/KhronosGroup/SPIRV-Tools/tags?per_page=100"
parser = "regex"
pattern = '"name":"vulkan-sdk-([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)"'
headers = { "User-Agent" = "bentoo-autoupdate" }

# vulkan-headers — per-update tags "vX.Y.Z" (3-digit), not the 4-digit SDK tags.
["dev-util/vulkan-headers"]
url = "https://api.github.com/repos/KhronosGroup/Vulkan-Headers/tags?per_page=100"
parser = "regex"
pattern = '"name":"v(1\.4\.[0-9]+)"'
headers = { "User-Agent" = "bentoo-autoupdate" }

# vulkan-tools — per-update tags "vX.Y.Z".
["dev-util/vulkan-tools"]
url = "https://api.github.com/repos/KhronosGroup/Vulkan-Tools/tags?per_page=100"
parser = "regex"
pattern = '"name":"v(1\.4\.[0-9]+)"'
headers = { "User-Agent" = "bentoo-autoupdate" }

# vulkan-utility-libraries — per-update tags "vX.Y.Z".
["dev-util/vulkan-utility-libraries"]
url = "https://api.github.com/repos/KhronosGroup/Vulkan-Utility-Libraries/tags?per_page=100"
parser = "regex"
pattern = '"name":"v(1\.4\.[0-9]+)"'
headers = { "User-Agent" = "bentoo-autoupdate" }

# vulkan-layers — Vulkan-ValidationLayers, per-update tags "vX.Y.Z".
["media-libs/vulkan-layers"]
url = "https://api.github.com/repos/KhronosGroup/Vulkan-ValidationLayers/tags?per_page=100"
parser = "regex"
pattern = '"name":"v(1\.4\.[0-9]+)"'
headers = { "User-Agent" = "bentoo-autoupdate" }

# vulkan-loader — per-update tags "vX.Y.Z" (anchor ignores windows-rt-* junk tags).
["media-libs/vulkan-loader"]
url = "https://api.github.com/repos/KhronosGroup/Vulkan-Loader/tags?per_page=100"
parser = "regex"
pattern = '"name":"v(1\.4\.[0-9]+)"'
headers = { "User-Agent" = "bentoo-autoupdate" }

