# Bentoo Autoupdate Package Configuration
# Each section defines how to check upstream versions for a package

["net-misc/postman-bin"]
url = "https://dl.pstmn.io/api/version/latest?platform=linux64&channel=stable"
parser = "json"
path = "version"
binary = true

# ---- Test batch: 10 randomly selected packages ----

["media-plugins/gst-plugins-cdio"]
url = "https://gitlab.freedesktop.org/api/v4/projects/gstreamer%2Fgstreamer/repository/tags?per_page=1"
parser = "json"
path = "[0].name"

["media-plugins/gst-plugins-dtls"]
url = "https://gitlab.freedesktop.org/api/v4/projects/gstreamer%2Fgstreamer/repository/tags?per_page=1"
parser = "json"
path = "[0].name"

["media-gfx/inkscape"]
url = "https://gitlab.com/api/v4/projects/inkscape%2Finkscape/repository/tags?per_page=1"
parser = "json"
path = "[0].name"

["dev-libs/liborcus"]
url = "https://gitlab.com/api/v4/projects/orcus%2Forcus/repository/tags?per_page=1"
parser = "json"
path = "[0].name"

["dev-ruby/erb"]
url = "https://api.github.com/repos/ruby/erb/tags?per_page=1"
parser = "json"
path = "[0].name"
headers = { "User-Agent" = "bentoo-autoupdate" }

["mail-client/betterbird-bin"]
url = "https://api.github.com/repos/Betterbird/thunderbird-patches/tags?per_page=1"
parser = "json"
path = "[0].name"
binary = true
headers = { "User-Agent" = "bentoo-autoupdate" }

["kde-plasma/plasma-integration"]
url = "https://invent.kde.org/api/v4/projects/plasma%2Fplasma-integration/repository/tags?per_page=1"
parser = "json"
path = "[0].name"

["kde-plasma/kde-cli-tools-common"]
url = "https://invent.kde.org/api/v4/projects/plasma%2Fkde-cli-tools/repository/tags?per_page=1"
parser = "json"
path = "[0].name"

["kde-plasma/plasma-login-sessions"]
url = "https://invent.kde.org/api/v4/projects/plasma%2Fplasma-workspace/repository/tags?per_page=1"
parser = "json"
path = "[0].name"

["app-office/libreoffice-l10n"]
url = "https://www.libreoffice.org/download/download-libreoffice/"
parser = "regex"
pattern = "(\\d+\\.\\d+\\.\\d+)"
