              - article [ref=e626]:
                - generic [ref=e628]:
                  - img [ref=e629]
                  - link "README.md" [ref=e631] [cursor=pointer]:
                    - /url: /mobile-broadband/ModemManager/-/blob/main/README.md?ref_type=heads
                    - strong [ref=e632]: README.md
                - generic [ref=e636]:
                  - heading "ModemManagerLink to heading 'ModemManager'" [level=1] [ref=e637]:
                    - text: ModemManager
                    - link "Link to heading 'ModemManager'" [ref=e638] [cursor=pointer]:
                      - /url: "#modemmanager"
                  - paragraph [ref=e639]: ModemManager provides a unified high level API for communicating with mobile broadband modems, regardless of the protocol used to communicate with the actual device (Generic AT, vendor-specific AT, QCDM, QMI, MBIM...).
                  - heading "Getting StartedLink to heading 'Getting Started'" [level=2] [ref=e640]:
                    - text: Getting Started
                    - link "Link to heading 'Getting Started'" [ref=e641] [cursor=pointer]:
                      - /url: "#getting-started"
                  - paragraph [ref=e642]:
                    - text: ModemManager uses the meson build system. Meson is likely available as a package from your Linux distribution, but if not please refer to the
                    - link "Meson project" [ref=e643] [cursor=pointer]:
                      - /url: https://mesonbuild.com/Quick-guide.html
                    - text: for installation instructions. Once you have Meson installed you'll probably want to install
                    - link "libmbim" [ref=e644] [cursor=pointer]:
                      - /url: https://gitlab.freedesktop.org/mobile-broadband/libmbim
                    - text: and
                    - link "libqmi" [ref=e645] [cursor=pointer]:
                      - /url: https://gitlab.freedesktop.org/mobile-broadband/libqmi
                    - text: which most modems require.
                  - paragraph [ref=e646]: "After dependencies are installed you can build ModemManager with:"
                  - generic [ref=e647]:
                    - code [ref=e649]: $ meson setup build --prefix=/usr --buildtype=release $ ninja -C build
                    - button "Copiar para a área de transferência" [ref=e651] [cursor=pointer]:
                      - img [ref=e652]
                  - paragraph [ref=e654]: "And after a successful build, install with:"
                  - generic [ref=e655]:
                    - code [ref=e657]: $ sudo ninja -C build install
                    - button "Copiar para a área de transferência" [ref=e659] [cursor=pointer]:
                      - img [ref=e660]
                  - heading "UsingLink to heading 'Using'" [level=2] [ref=e662]:
                    - text: Using
                    - link "Link to heading 'Using'" [ref=e663] [cursor=pointer]:
                      - /url: "#using"
                  - paragraph [ref=e664]: ModemManager is a system daemon and is not meant to be used directly from the command line. However, since it provides a DBus API, it is possible to use 'dbus-send' commands or the new 'mmcli' command line interface to control it from the terminal. The devices are queried from udev and automatically updated based on hardware events, although a manual re-scan can also be requested to look for RS232 modems.
                  - heading "ImplementationLink to heading 'Implementation'" [level=2] [ref=e665]:
                    - text: Implementation
                    - link "Link to heading 'Implementation'" [ref=e666] [cursor=pointer]:
                      - /url: "#implementation"
                  - paragraph [ref=e667]: ModemManager is a DBus system bus activated service (meaning it's started automatically when a request arrives). It is written in C, using glib and gio. Several GInterfaces specify different features that the modems support, including the generic MMIfaceModem3gpp and MMIfaceModemCdma which provide basic operations for 3GPP (GSM, UMTS, LTE) or CDMA (CDMA1x, EV-DO) modems. If a given feature is not available in the modem, the specific interface will not be exported in DBus.
                  - heading "PluginsLink to heading 'Plugins'" [level=2] [ref=e668]:
                    - text: Plugins
                    - link "Link to heading 'Plugins'" [ref=e669] [cursor=pointer]:
                      - /url: "#plugins"
                  - paragraph [ref=e670]: Plugins are loaded on startup, and must implement the MMPlugin interface. It consists of a couple of methods which tell the daemon whether the plugin supports a port and to create custom MMBroadbandModem implementations. It most likely makes sense to derive custom modem implementations from one of the generic classes and just add (or override) operations which are not standard. There are multiple fully working plugins in the plugins/ directory that can be used as an example for writing new plugins. Writing new plugins is highly encouraged! The plugin API is open for changes, so if you're writing a plugin and need to add or change some public method, feel free to suggest it!
                  - heading "LicenseLink to heading 'License'" [level=2] [ref=e671]:
                    - text: License
                    - link "Link to heading 'License'" [ref=e672] [cursor=pointer]:
                      - /url: "#license"
                  - paragraph [ref=e673]: The ModemManager and mmcli binaries are both GPLv2+ (See COPYING). The libmm-glib library and the ModemManager API headers are LGPLv2+ (See COPYING.LIB).
                  - heading "Code of ConductLink to heading 'Code of Conduct'" [level=2] [ref=e674]:
                    - text: Code of Conduct
                    - link "Link to heading 'Code of Conduct'" [ref=e675] [cursor=pointer]:
                      - /url: "#code-of-conduct"
                  - paragraph [ref=e676]:
                    - text: "Please note that this project is released with a Contributor Code of Conduct. By participating in this project you agree to abide by its terms, which you can find in the following link:"
                    - link "https://www.freedesktop.org/wiki/CodeOfConduct" [ref=e677] [cursor=pointer]:
                      - /url: https://www.freedesktop.org/wiki/CodeOfConduct
                  - paragraph [ref=e678]:
                    - text: "CoC issues may be raised to the project maintainers at the following address:"
                    - link "modemmanager-devel-owner@lists.freedesktop.org" [ref=e679] [cursor=pointer]:
                      - /url: mailto:modemmanager-devel-owner@lists.freedesktop.org